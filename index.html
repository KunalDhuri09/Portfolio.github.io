<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#fff7ed;
}

.section{
padding:80px 20px;
}

.container{
max-width:700px;
margin:auto;
}

.title{
text-align:center;
font-size:32px;
font-weight:700;
margin-bottom:40px;
}

.contact-form{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:600;
}

input, textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

button{
background:#f97316;
color:white;
border:none;
padding:12px 24px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.success{
display:none;
background:#16a34a;
color:white;
padding:12px;
border-radius:8px;
margin-bottom:20px;
text-align:center;
}

</style>

</head>



<body>

<section class="section">

<div class="container">

<h2 class="title">Contact Us</h2>

<div class="contact-form">

<div id="successMsg" class="success">
Message sent successfully!
</div>

<form id="contactForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" id="phone" required>
</div>

<div class="form-group">
<label>Message</label>
<textarea id="message" required></textarea>
</div>

<button type="submit">
Send Message
</button>

</form>

</div>

</div>

</section>



<script>

document.getElementById("contactForm")
.addEventListener("submit",function(e){

e.preventDefault();

let formData=new FormData();

formData.append("name",document.getElementById("name").value);
formData.append("email",document.getElementById("email").value);
formData.append("phone",document.getElementById("phone").value);
formData.append("message",document.getElementById("message").value);

fetch("https://script.google.com/macros/s/AKfycbxf_5kCqCP6qnvntK83DZQuMkrcExRtCXnV60uOSu49caOpOw8aohqGEGMj8HjsxsP0Jg/exec",{
method:"POST",
body:formData
})
.then(res=>res.text())
.then(data=>{

document.getElementById("successMsg").style.display="block";

document.getElementById("contactForm").reset();

});

});

</script>

</body>
</html>
